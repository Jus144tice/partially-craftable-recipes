name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build & test
        # `build` formats (spotlessApply), compiles, runs the JUnit suite, and jars in one go.
        run: |
          chmod +x ./gradlew
          ./gradlew build --no-daemon --stacktrace

      - name: Upload mod jar
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: partiallycraftablerecipes-jar
          path: build/libs/*.jar
          if-no-files-found: error
